<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificador de Par o Impar</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .contenedor { 
            background-color: #f8f9fa; 
            padding: 20px; 
            border-radius: 8px; 
            max-width: 400px; 
            border-left: 5px solid #28a745; 
        }
        input { margin: 5px 0 15px 0; padding: 8px; width: 90%; }
        button { 
            cursor: pointer; 
            background-color: #28a745; 
            color: white; 
            border: none; 
            padding: 10px 15px; 
            border-radius: 4px;
            font-weight: bold;
        }
        #resultado { margin-top: 15px; font-size: 1.1em; color: #333; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h2>Verificador de Par o Impar</h2>
        
        <label for="numero">Ingresa un número:</label>
        <input type="number" id="numero" placeholder="Ej. 7">
        
        <button onclick="verificarParidad()">Verificar</button>
        
        <p id="resultado"></p>
    </div>

    <script>
        function verificarParidad() {
            // 1. Capturamos el número ingresado
            let numero = Number(document.getElementById('numero').value);
            let cajaResultado = document.getElementById('resultado');

            // 2. Calculamos el resto usando el operador módulo (%)
            let resto = numero % 2;
            
            // 3. Evaluamos si el resto es 0 (par) o distinto de 0 (impar)
            if (resto === 0) {
                cajaResultado.innerHTML = "Par ya que " + numero + " dividido entre 2 tiene un resto de " + resto + ", por lo que es par.";
            } else {
                cajaResultado.innerHTML = "Impar ya que " + numero + " dividido entre 2 tiene un resto de " + resto + ", por lo que es impar.";
            }
        }
    </script>
</body>
</html>
