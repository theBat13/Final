<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitácora de Préstamos FIM - UAS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .header-fim { background-color: #003366; color: white; padding: 20px 0; margin-bottom: 30px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; }
        .table-responsive { max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body>

    <header class="header-fim text-center">
        <div class="container">
            <h1>Facultad de Ingeniería Mochis</h1>
            <p class="lead mb-0">Sistema de Control y Bitácora de Préstamo de Equipos</p>
        </div>
    </header>

    <div class="container-fluid px-4">
        <div class="row">
            
            <div class="col-lg-4 mb-4">
                <div class="card p-4">
                    <h4 class="mb-4">Nuevo Préstamo</h4>
                    <form id="formPrestamo">
                        <div class="mb-3">
                            <label for="nombreUsuario" class="form-label">Nombre del Solicitante</label>
                            <input type="text" class="form-control" id="nombreUsuario" placeholder="Ej. Alan Martinez" required>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="rol" class="form-label">Rol</label>
                                <select class="form-select" id="rol" required>
                                    <option value="Alumno">Alumno</option>
                                    <option value="Profesor">Profesor</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="carrera" class="form-label">Carrera</label>
                                <select class="form-select" id="carrera" required>
                                    <option value="Ingeniería de Software">Ingeniería de Software</option>
                                    <option value="Ingeniería Civil">Ingeniería Civil</option>
                                    <option value="Ingeniería Geodésica">Ingeniería Geodésica</option>
                                    <option value="Ingeniería de Procesos">Ingeniería de Procesos</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="equipo" class="form-label">Equipo a Prestar</label>
                            <select class="form-select" id="equipo" required>
                                <option value="" selected disabled>Seleccione un equipo...</option>
                                <option value="Proyector Epson">Proyector Epson</option>
                                <option value="Laptop Dell 15">Laptop Dell 15"</option>
                                <option value="Router Inalámbrico">Router Inalámbrico</option>
                                <option value="Cable HDMI">Cable HDMI</option>
                                <option value="Extensión Eléctrica">Extensión Eléctrica</option>
                            </select>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="fecha" class="form-label">Fecha</label>
                                <input type="date" class="form-control" id="fecha" required>
                            </div>
                            <div class="col-md-6">
                                <label for="horaPrestamo" class="form-label">Hora Salida</label>
                                <input type="time" class="form-control" id="horaPrestamo" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100" style="background-color: #003366; border-color: #003366;">Registrar Préstamo</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="mb-0">Bitácora Activa</h4>
                        <button class="btn btn-outline-danger btn-sm" onclick="limpiarBitacora()">Limpiar Historial</button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover table-bordered align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Nombre</th>
                                    <th>Carrera</th>
                                    <th>Rol</th>
                                    <th>Equipo</th>
                                    <th>Fecha</th>
                                    <th>Hr. Préstamo</th>
                                    <th>Hr. Entrega</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tablaCuerpo">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Inicializamos la fecha actual en el formulario por comodidad
        document.getElementById('fecha').valueAsDate = new Date();

        // Arreglo para almacenar los préstamos
        let prestamos = [];

        // Función que se ejecuta al cargar la página
        document.addEventListener('DOMContentLoaded', () => {
            // Cargar datos de localStorage si existen
            const datosGuardados = localStorage.getItem('bitacoraFIM');
            if (datosGuardados) {
                prestamos = JSON.parse(datosGuardados);
            }
            renderizarTabla();
        });

        // Evento para capturar el formulario
        document.getElementById('formPrestamo').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que la página se recargue

            // Capturar los valores del formulario
            const nuevoPrestamo = {
                id: Date.now(), // Generamos un ID único basado en el tiempo
                nombre: document.getElementById('nombreUsuario').value,
                rol: document.getElementById('rol').value,
                carrera: document.getElementById('carrera').value,
                equipo: document.getElementById('equipo').value,
                fecha: document.getElementById('fecha').value,
                horaPrestamo: document.getElementById('horaPrestamo').value,
                horaEntrega: null // Inicialmente no se ha entregado
            };

            // Agregar al arreglo y guardar en localStorage
            prestamos.push(nuevoPrestamo);
            guardarDatos();
            renderizarTabla();
            
            // Limpiar campos específicos del formulario
            document.getElementById('nombreUsuario').value = '';
            document.getElementById('equipo').value = '';
            document.getElementById('horaPrestamo').value = '';
        });

        // Función para mostrar los datos en la tabla HTML
        function renderizarTabla() {
            const tbody = document.getElementById('tablaCuerpo');
            tbody.innerHTML = ''; // Limpiar la tabla antes de re-dibujar

            if(prestamos.length === 0){
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">No hay préstamos registrados actualmente.</td></tr>';
                return;
            }

            prestamos.forEach((prestamo) => {
                const tr = document.createElement('tr');
                
                // Si ya se entregó, aplicamos un color de fondo sutil
                if (prestamo.horaEntrega) {
                    tr.classList.add('table-success');
                }

                // Definimos el contenido de la fila
                tr.innerHTML = `
                    <td>${prestamo.nombre}</td>
                    <td><span class="badge bg-secondary">${prestamo.carrera}</span></td>
                    <td>${prestamo.rol}</td>
                    <td><strong>${prestamo.equipo}</strong></td>
                    <td>${prestamo.fecha}</td>
                    <td>${prestamo.horaPrestamo}</td>
                    <td class="text-center">
                        ${prestamo.horaEntrega ? `<span class="text-success fw-bold">${prestamo.horaEntrega}</span>` : `<span class="text-warning">Pendiente</span>`}
                    </td>
                    <td class="text-center">
                        ${!prestamo.horaEntrega 
                            ? `<button class="btn btn-success btn-sm" onclick="registrarEntrega(${prestamo.id})">Recibir</button>` 
                            : `<button class="btn btn-secondary btn-sm" disabled>Completado</button>`}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Función para actualizar la hora de entrega
        function registrarEntrega(id) {
            // Obtenemos la hora actual del sistema
            const ahora = new Date();
            let horas = ahora.getHours().toString().padStart(2, '0');
            let minutos = ahora.getMinutes().toString().padStart(2, '0');
            const horaActualStr = `${horas}:${minutos}`;

            // Buscamos el préstamo en el arreglo y le asignamos la hora de entrega
            prestamos = prestamos.map(p => {
                if (p.id === id) {
                    return { ...p, horaEntrega: horaActualStr };
                }
                return p;
            });

            guardarDatos();
            renderizarTabla();
        }

        // Guardar el arreglo en el almacenamiento del navegador
        function guardarDatos() {
            localStorage.setItem('bitacoraFIM', JSON.stringify(prestamos));
        }

        // Función de utilidad para limpiar todo (útil para pruebas)
        function limpiarBitacora() {
            if(confirm('¿Estás seguro de eliminar todo el historial de la bitácora? Esto no se puede deshacer.')){
                prestamos = [];
                guardarDatos();
                renderizarTabla();
            }
        }
    </script>
</body>
</html>
