<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora con Formularios</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .contenedor { 
            background-color: #f8f9fa; 
            padding: 20px; 
            border-radius: 8px; 
            max-width: 400px; 
            border-left: 5px solid #003366;
        }
        input { margin: 5px 0 15px 0; padding: 8px; width: 90%; }
        button { 
            cursor: pointer; 
            background-color: #ffcc00; 
            color: #000; 
            border: none; 
            padding: 8px 12px;
            margin: 2px;
            border-radius: 4px; 
            font-weight: bold;
        }
        button:hover { background-color: #e6b800; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>Calculadora Interactiva</h2>

        <label for="valor1">Número 1:</label><br>
        <input type="number" id="valor1" placeholder="Ej. 10">

        <label for="valor2">Número 2:</label><br>
        <input type="number" id="valor2" placeholder="Ej. 2">

        <div>
            <button onclick="sumar()">Sumar</button>
            <button onclick="restar()">Restar</button>
            <button onclick="dividir()">Dividir</button>
            <button onclick="exponenciar()">Exponenciar</button>
        </div>

        <hr>
        <h3>Resultado: <span id="resultado">0</span></h3>
    </div>

    <script>
        // Función auxiliar para no repetir código: obtiene y convierte los números
        function obtenerNumeros() {
            let num1 = Number(document.getElementById('valor1').value);
            let num2 = Number(document.getElementById('valor2').value);
            return { num1, num2 };
        }

        // Función auxiliar para imprimir en pantalla
        function mostrarResultado(valor) {
            document.getElementById('resultado').innerHTML = valor;
        }

        // --- Funciones de las operaciones ---
        function sumar() {
            let valores = obtenerNumeros();
            let resultado = valores.num1 + valores.num2;
            mostrarResultado(resultado);
        }

        function restar() {
            let valores = obtenerNumeros();
            let resultado = valores.num1 - valores.num2;
            mostrarResultado(resultado);
        }

        function dividir() {
            let valores = obtenerNumeros();
            // Evitamos que el programa falle si se intenta dividir entre cero
            if (valores.num2 === 0) {
                mostrarResultado("No se puede dividir por cero");
            } else {
                let resultado = valores.num1 / valores.num2;
                mostrarResultado(resultado);
            }
        }

        function exponenciar() {
            let valores = obtenerNumeros();
            let resultado = valores.num1 ** valores.num2;
            mostrarResultado(resultado);
        }
    </script>

</body>
</html>
