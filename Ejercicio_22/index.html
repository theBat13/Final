<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórmula General</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .contenedor { 
            background-color: #f8f9fa; 
            padding: 20px; 
            border-radius: 8px; 
            max-width: 400px; 
            border-left: 5px solid #003366;
        }
        input { margin: 5px 0 15px 0; padding: 8px; width: 90%; }
        button { 
            cursor: pointer; 
            background-color: #ffcc00; 
            border: none; 
            padding: 10px 15px;
            font-weight: bold;
            border-radius: 4px;
        }
        #resultado {
            margin-top: 15px;
            font-size: 1.1em;
            color: #003366;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>Calculadora de Fórmula General</h2>
        
        <label for="valorA">Valor de a:</label>
        <input type="number" id="valorA" placeholder="Ej. 1">

        <label for="valorB">Valor de b:</label>
        <input type="number" id="valorB" placeholder="Ej. -5">

        <label for="valorC">Valor de c:</label>
        <input type="number" id="valorC" placeholder="Ej. 6">

        <button onclick="calcular()">Calcular x1 y x2</button>

        <p id="resultado"></p>
    </div>

    <script>
        function calcular() {
            // 1. Capturamos y convertimos los valores a números
            let a = Number(document.getElementById('valorA').value);
            let b = Number(document.getElementById('valorB').value);
            let c = Number(document.getElementById('valorC').value);
            let cajaResultado = document.getElementById('resultado');

            // 2. Validamos que 'a' no sea cero (la división entre cero da error)
            if (a === 0) {
                cajaResultado.innerHTML = "El valor de 'a' no puede ser 0.";
                return; // Detiene la función
            }

            // 3. Calculamos el discriminante (la parte de adentro de la raíz)
            let discriminante = (b ** 2) - (4 * a * c);

            // 4. Validamos si la raíz es negativa (no tiene solución en números reales)
            if (discriminante < 0) {
                cajaResultado.innerHTML = "La ecuación no tiene soluciones reales (la raíz es negativa).";
            } else {
                // 5. Calculamos la raíz cuadrada y aplicamos el resto de la fórmula
                let raiz = Math.sqrt(discriminante);
                
                let x1 = (-b + raiz) / (2 * a);
                let x2 = (-b - raiz) / (2 * a);

                // 6. Imprimimos el mensaje final
                cajaResultado.innerHTML = "<strong>Resultados:</strong><br> x1 = " + x1 + "<br> x2 = " + x2;
            }
        }
    </script>
</body>
</html>
